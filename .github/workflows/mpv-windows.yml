name: Desktop release builds

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "**/*.rs"
      - "**/*.slint"
      - "**/Cargo.toml"
      - "Cargo.lock"
      - "mpv.lock.json"
      - "vcpkg.json"
      - "triplets/**"
      - "vcpkg-overlays/**"
      - "setup/**"
      - "scripts/generate_release_notes.py"
      - ".github/workflows/**"

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 10
  CARGO_HTTP_MULTIPLEXING: false

jobs:
  windows:
    name: Windows x64
    runs-on: windows-2022
    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-pc-windows-msvc
      - name: Export GitHub Actions cache environment for vcpkg
        uses: actions/github-script@v9
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL);
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN);
      - name: Restore vcpkg cache
        id: vcpkg-cache
        uses: actions/cache/restore@v6
        with:
          path: vcpkg_installed
          key: Windows-vcpkg-x86-64-v3-static-release-v1-${{ hashFiles('vcpkg.json', 'triplets/**', 'vcpkg-overlays/**') }}
          restore-keys: |
            Windows-vcpkg-x86-64-v3-static-release-v1-
      - name: Install optimized static libtorrent
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "84bab45d415d22042bd0b9081aea57f362da3f35"
          vcpkgDirectory: "${{ github.workspace }}/vcpkg"
          vcpkgJsonGlob: "vcpkg.json"
          runVcpkgInstall: true
        env:
          VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
          VCPKG_DEFAULT_TRIPLET: x64-windows-v3-static-release
          VCPKG_OVERLAY_TRIPLETS: ${{ github.workspace }}/triplets
          VCPKG_OVERLAY_PORTS: ${{ github.workspace }}/vcpkg-overlays
      - name: Save vcpkg cache
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: vcpkg_installed
          key: Windows-vcpkg-x86-64-v3-static-release-v1-${{ hashFiles('vcpkg.json', 'triplets/**', 'vcpkg-overlays/**') }}
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --locked --release --package stremio-native
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
          VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
          VCPKGRS_TRIPLET: x64-windows-v3-static-release
          PKG_CONFIG_PATH: ${{ github.workspace }}/vcpkg_installed/x64-windows-v3-static-release/lib/pkgconfig
      - name: Verify runtime bundle
        shell: pwsh
        run: |
          $root = "target/release"
          @("stremio-native.exe", "libmpv-2.dll", "licenses/mpv/LICENSE.GPL", "licenses/mpv/LICENSE.LGPL") | ForEach-Object {
            if (-not (Test-Path (Join-Path $root $_))) { throw "Missing release artifact: $_" }
          }
      - name: Build installer and updater archive
        shell: cmd
        run: |
          set "SKIP_BUILD=1"
          call setup\create_setup.cmd
      - uses: actions/upload-artifact@v7
        with:
          name: stremio-native-windows-x64
          path: |
            target/release/stremio-native.exe
            target/release/libmpv-2.dll
            target/release/licenses/mpv
            artifacts/StremioSetup-v*-x64.exe
            artifacts/stremio-native-v*-x86_64-pc-windows-msvc.zip
          if-no-files-found: error

  linux:
    name: Linux x64
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Restore apt cache
        id: apt-cache
        uses: actions/cache/restore@v6
        with:
          path: /var/cache/apt/archives
          key: linux-apt-deps-v1
      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang cmake ninja-build pkg-config libssl-dev libtorrent-rasterbar-dev libboost-dev libclang-dev libgtk-3-dev libayatana-appindicator3-dev libmpv-dev libfontconfig1-dev libfreetype6-dev libxkbcommon-dev libwayland-dev libx11-xcb-dev libxcb-shape0-dev libxcb-xfixes0-dev libgl1-mesa-dev libegl1-mesa-dev
      - name: Save apt cache
        if: steps.apt-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: /var/cache/apt/archives
          key: linux-apt-deps-v1
      - name: Build release
        run: cargo build --locked --release --package stremio-native
      - name: Install cargo-deb
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb
      - name: Build DEB Package
        run: cargo deb --package stremio-native --no-build
      - uses: actions/upload-artifact@v7
        with:
          name: stremio-native-linux-x64
          path: target/release/stremio-native
          if-no-files-found: error
      - uses: actions/upload-artifact@v7
        with:
          name: stremio-native-linux-deb
          path: target/debian/*.deb
          if-no-files-found: error

  arch:
    name: Arch Linux x64
    needs: linux
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v7
      - name: Download Linux binary
        uses: actions/download-artifact@v8
        with:
          name: stremio-native-linux-x64
          path: target/release
      - name: Install packaging dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --needed --noconfirm base-devel
      - name: Create PKGBUILD
        run: |
          pkgver=$(grep -m1 'version = ' app/Cargo.toml | cut -d '"' -f2)
          mkdir -p pkg
          cat > pkg/PKGBUILD << EOF
          # Maintainer: stremio-native maintainers
          pkgname=stremio-native
          pkgver=${pkgver}
          pkgrel=1
          pkgdesc="High-performance native Stremio client built with Rust and Slint"
          arch=('x86_64')
          url="https://github.com/perpetus/stremio-native"
          license=('GPL-3.0')
          depends=('openssl' 'libtorrent-rasterbar' 'boost-libs' 'mpv' 'gtk3' 'libayatana-appindicator')
          source=("stremio-native")
          sha256sums=('SKIP')

          package() {
              install -Dm755 "\$srcdir/stremio-native" "\$pkgdir/usr/bin/stremio-native"
          }
          EOF
          cp target/release/stremio-native pkg/stremio-native
      - name: Build package
        run: |
          cd pkg
          useradd -m builder
          chown -R builder:builder .
          su builder -c "makepkg -d --noconfirm"
      - name: Upload Arch Package
        uses: actions/upload-artifact@v7
        with:
          name: stremio-native-arch-pkg
          path: pkg/*.pkg.tar.zst
          if-no-files-found: error

  fedora:
    name: Fedora x64
    needs: linux
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v7
      - name: Download Linux binary
        uses: actions/download-artifact@v8
        with:
          name: stremio-native-linux-x64
          path: target/release
      - name: Restore dnf cache
        id: dnf-cache
        uses: actions/cache/restore@v6
        with:
          path: /var/cache/dnf
          key: fedora-dnf-rpm-build
      - name: Install packaging dependencies
        run: |
          dnf install -y rpm-build
      - name: Save dnf cache
        if: steps.dnf-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: /var/cache/dnf
          key: fedora-dnf-rpm-build
      - name: Create RPM Spec
        run: |
          pkgver=$(grep -m1 'version = ' app/Cargo.toml | cut -d '"' -f2)
          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp target/release/stremio-native rpmbuild/SOURCES/
          cat > rpmbuild/SPECS/stremio-native.spec << 'SPEC'
          Name:           stremio-native
          Version:        __VERSION__
          Release:        1%{?dist}
          Summary:        High-performance native Stremio client built with Rust and Slint
          License:        GPLv3
          URL:            https://github.com/perpetus/stremio-native
          Source0:        stremio-native
          Requires:       openssl libtorrent-rasterbar mpv gtk3 libayatana-appindicator3

          %description
          High-performance native Stremio client built with Rust and Slint.

          %install
          rm -rf %{buildroot}
          mkdir -p %{buildroot}%{_bindir}
          install -p -m 755 %{_sourcedir}/stremio-native %{buildroot}%{_bindir}/stremio-native

          %files
          %{_bindir}/stremio-native

          %changelog
          * Sun Jul 19 2026 stremio-native maintainers <stremio-native@example.com> - __VERSION__-1
          - Initial release
          SPEC
          sed -i "s/__VERSION__/$pkgver/g" rpmbuild/SPECS/stremio-native.spec
      - name: Build RPM Package
        run: |
          rpmbuild -bb rpmbuild/SPECS/stremio-native.spec --define "_topdir $(pwd)/rpmbuild"
      - name: Upload RPM Package
        uses: actions/upload-artifact@v7
        with:
          name: stremio-native-fedora-rpm
          path: rpmbuild/RPMS/x86_64/*.rpm
          if-no-files-found: error

  release:
    name: Publish tagged release
    needs: [windows, linux, arch, fedora]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release

          copy_latest() {
            local pattern="$1"
            local source
            source="$(find artifacts -type f -name "$pattern" | sort -V | tail -n 1)"
            if [[ -z "$source" ]]; then
              echo "Missing required release asset: $pattern" >&2
              exit 1
            fi
            cp "$source" release/
          }

          copy_latest "StremioSetup-v*-x64.exe"
          copy_latest "stremio-native-v*-x86_64-pc-windows-msvc.zip"
          copy_latest "*.deb"
          copy_latest "*.pkg.tar.zst"
          copy_latest "*.rpm"

          linux_binary="$(find artifacts/stremio-native-linux-x64 -type f -name stremio-native | head -n 1)"
          if [[ -z "$linux_binary" ]]; then
            echo "Missing required Linux release binary" >&2
            exit 1
          fi
          linux_asset="release/stremio-native-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu"
          cp "$linux_binary" "$linux_asset"
          chmod +x "$linux_asset"

          (cd release && sha256sum * > SHA256SUMS.txt)
          find release -maxdepth 1 -type f -printf '%f\n' | sort
      - name: Prepare release notes
        shell: bash
        run: |
          previous_tag="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
          python scripts/generate_release_notes.py \
            --repo "${GITHUB_REPOSITORY}" \
            --tag "${GITHUB_REF_NAME}" \
            --previous-tag "${previous_tag}" \
            --asset-dir release \
            --changelog CHANGELOG.md \
            --output "${GITHUB_WORKSPACE}/RELEASE_BODY.md"
          cat "${GITHUB_WORKSPACE}/RELEASE_BODY.md"
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: release/*
          body_path: RELEASE_BODY.md
          fail_on_unmatched_files: true
          generate_release_notes: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') || contains(github.ref, 'rc') }}
